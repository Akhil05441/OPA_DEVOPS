name: OPA Policy Check

on:
  push:
    branches:
      - main

jobs:
  policy-check:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Run OPA Policy Check
        uses: instrumenta/conftest-action@master
        with:
          files: config.json
          policy: policy
          namespace: main
          combine: false
          output: stdout